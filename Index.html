<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instaclone Profile</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --secondary: #a8a8a8;
            --border: #262626;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding-bottom: 60px; /* Space for nav */
        }

        /* Profile Header */
        .profile-header {
            padding: 20px 15px;
            display: flex;
            align-items: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--border);
            margin-right: 20px;
        }

        .stats {
            display: flex;
            flex-grow: 1;
            justify-content: space-around;
            text-align: center;
        }

        .stat-num { font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: var(--secondary); }

        /* Bio Section */
        .bio { padding: 0 15px 15px; font-size: 14px; }
        .bio b { display: block; margin-bottom: 4px; }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 8px;
            padding: 0 15px 15px;
        }
        .btn {
            flex: 1;
            background: #363636;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        /* Post Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            border-top: 1px solid var(--border);
            padding-top: 2px;
        }

        .grid-item {
            aspect-ratio: 1 / 1;
            background: #121212;
            overflow: hidden;
            position: relative;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bottom Nav */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: black;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header class="profile-header">
        <img src="https://via.placeholder.com/150" class="avatar" alt="Profile">
        <div class="stats">
            <div><span class="stat-num">262</span><span class="stat-label">posts</span></div>
            <div><span class="stat-num">965</span><span class="stat-label">followers</span></div>
            <div><span class="stat-num">11</span><span class="stat-label">following</span></div>
        </div>
    </header>

    <div class="bio">
        <b>jifop_</b>
        Gaming video creator <br>
        MOM & DAD ❤️ <br>
        SCARFALL 2.0 💖
    </div>

    <div class="actions">
        <button class="btn">Edit profile</button>
        <button class="btn">Share profile</button>
    </div>

    <main class="grid">
        <div class="grid-item"><img src="https://via.placeholder.com/300" alt="post"></div>
        <div class="grid-item"><img src="https://via.placeholder.com/300" alt="post"></div>
        <div class="grid-item"><img src="https://via.placeholder.com/300" alt="post"></div>
        <div class="grid-item"><img src="https://via.placeholder.com/300" alt="post"></div>
        <div class="grid-item"><img src="https://via.placeholder.com/300" alt="post"></div>
        <div class="grid-item"><img src="https://via.placeholder.com/300" alt="post"></div>
    </main>

    <nav>
        <span>🏠</span>
        <span>🔍</span>
        <span>➕</span>
        <span>🎬</span>
        <span>👤</span>
    </nav>

</body>
</html>
